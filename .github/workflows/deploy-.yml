name: Build & Deploy (Manual Only)

on:
  workflow_dispatch:  # Manual trigger only
  # push:
  #   branches: [main]  # Disabled - enable when Docker Hub & K8s configured

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: bash ./build-push.sh
      - run: bash ./deploy.sh prod jamz-prod
